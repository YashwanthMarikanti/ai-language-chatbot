<!DOCTYPE html>
<html>
<head>
<title>AI Translator</title>
<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
margin-top:50px;
}
.box{
background:#1e293b;
padding:20px;
width:400px;
border-radius:10px;
}
#chat{
height:250px;
background:black;
padding:10px;
overflow:auto;
margin-bottom:10px;
}
input,select,button{
width:100%;
padding:10px;
margin-top:5px;
}
</style>
</head>

<body>

<div class="box">
<h3>AI Language Translator</h3>

<div id="chat"></div>

<input id="userInput" placeholder="Type message">

<select id="language">
<option value="hi">Hindi</option>
<option value="te">Telugu</option>
<option value="ta">Tamil</option>
<option value="kn">Kannada</option>
<option value="ml">Malayalam</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
</select>

<button onclick="sendMessage()">Translate</button>

</div>

<script src="script.js"></script>

</body>
</html>
